<!doctype html>
<html lang="ko">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <title>오늘도 모이 난사 중</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "Noto Sans KR", sans-serif;
            background: radial-gradient(circle at 20% 10%, #fff, #c8ebff 38%, #f4fbff 82%)
        }

        .wrap {
            width: min(440px, 100vw);
            padding: 10px;
            position: relative
        }

        .hud {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: start;
            padding: 8px 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .82);
            font-size: 12px
        }

        #hudLevel {
            font-weight: 800
        }
        #hudHeart{font-size:12px;font-weight:800;color:#be123c;margin-bottom:2px}

        #hudRight {
            text-align: right;
            font-weight: 900;
            font-size: 24px;
            line-height: 1
        }
        #hudRight .lb{display:block;font-size:10px;font-weight:700;color:#64748b;letter-spacing:.8px}

        #xpText {
            font-size: 10px;
            font-weight: 700;
            color: #334155;
            margin-top: 2px
        }

        #xpBar {
            height: 6px;
            background: #cbd5e1;
            border-radius: 999px;
            overflow: hidden;
            margin-top: 2px
        }

        #xpFill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #2563eb, #22c55e)
        }

        .bar {
            height: 10px;
            background: #d1d5db;
            border-radius: 999px;
            overflow: hidden
        }

        .fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #22c55e, #f59e0b, #ef4444)
        }

        #bossHud {
            display: none;
            margin-bottom: 8px;
            padding: 8px 10px;
            border-radius: 10px;
            background: rgba(10, 20, 35, .88);
            color: #f8fafc
        }

        #bossHud .r {
            display: flex;
            gap: 8px;
            align-items: center
        }

        #bossDir {
            font-size: 24px;
            font-weight: 800;
            width: 32px;
            text-align: center
        }

        #bossBar {
            height: 14px;
            border-radius: 999px;
            background: #334155;
            overflow: hidden;
            flex: 1
        }

        #bossFill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #f59e0b, #facc15, #fde047)
        }

        #bossTime {
            font-weight: 700;
            font-size: 12px
        }

        #bossHpTxt {
            font-size: 11px;
            font-weight: 700;
            min-width: 68px;
            text-align: right
        }

        canvas {
            width: min(96vw, 420px);
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 12px;
            border: 2px solid #b9d8ef;
            background: linear-gradient(180deg, #ebf8ff 0%, #eaf8ea 60%, #daf4d8 100%);
            aspect-ratio: 9/16
        }

        .overlay {
            position: absolute;
            inset: 84px 10px 10px;
            border-radius: 12px;
            background: rgba(11, 18, 32, .64);
            display: grid;
            place-items: center;
            z-index: 6;
            padding: 16px
        }

        .overlay[hidden] {
            display: none
        }

        .panel {
            width: min(350px, 100%);
            padding: 18px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .97);
            text-align: center
        }

        h1 {
            margin: 0 0 16px;
            font-size: 28px
        }

        .btns {
            display: grid;
            gap: 10px
        }

        button {
            border: 0;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 15px;
            font-weight: 700;
            background: #2563eb;
            color: #eff6ff;
            cursor: pointer
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 10px
        }

        .card {
            width: 100%;
            background: #0f172a;
            color: #e2e8f0;
            border: 1px solid #334155;
            text-align: left
        }

        .msg {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 3px 8px rgba(0, 0, 0, .45);
            text-align: center;
            white-space: pre-line
        }

        .item {
            position: absolute;
            right: 16px;
            bottom: 16px;
            z-index: 5;
            display: grid;
            gap: 8px
        }

        .slot {
            position: relative;
            width: 64px;
            height: 64px
        }

        .slot .t {
            position: absolute;
            top: -16px;
            width: 100%;
            text-align: center;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            text-shadow: 0 1px 2px #000
        }

        .slot button {
            width: 100%;
            height: 100%;
            padding: 0;
            font-size: 28px;
            border: 2px solid #64748b;
            background: rgba(15, 23, 42, .72)
        }

        .slot button.empty {
            font-size: 18px;
            color: #64748b
        }

        #buffUi {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            top: 108px;
            z-index: 5;
            display: flex;
            gap: 8px
        }

        .buff {
            min-width: 54px;
            padding: 5px 8px;
            border-radius: 10px;
            background: rgba(15, 23, 42, .72);
            color: #e2e8f0;
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            border: 1px solid #64748b
        }

        #devPanel {
            position: absolute;
            left: calc(100% + 10px);
            top: 86px;
            width: 150px;
            padding: 8px;
            border-radius: 10px;
            background: rgba(15, 23, 42, .9);
            color: #e2e8f0;
            z-index: 7
        }

        #devPanel button {
            width: 100%;
            margin-bottom: 6px;
            padding: 6px 8px;
            font-size: 12px
        }

        #statsBody {
            margin: 10px 0 12px;
            font-size: 13px;
            line-height: 1.5;
            color: #0f172a;
            white-space: pre-line;
            text-align: left
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="hud">
            <div>
                <div id="hudHeart">❤️ 200</div>
                <div id="hudLevel">LV 1</div>
                <div id="xpText">XP 0 / 10</div>
                <div id="xpBar">
                    <div id="xpFill"></div>
                </div>
            </div>
            <div id="hudRight"><span class="lb">TIME</span><span id="hudTimer">60.0s</span></div>
        </div>
        <div style="text-align:center;font-weight:800;color:#0f172a;margin:-2px 0 8px" id="hudCenter">S1 | 목표 👍 180</div>
        <div id="bossHud">
            <div class="r">
                <div id="bossDir">↑</div>
                <div id="bossBar">
                    <div id="bossFill"></div>
                </div>
                <div id="bossHpTxt">0%</div>
                <div id="bossTime">120.0s</div>
            </div>
        </div>
        <canvas id="game" width="540" height="960"></canvas>
        <div class="item">
            <div class="slot">
                <div class="t" id="st0"></div><button id="s0" class="empty">+</button>
            </div>
            <div class="slot">
                <div class="t" id="st1"></div><button id="s1" class="empty">+</button>
            </div>
        </div>
        <div id="buffUi"></div>
        <div class="overlay" id="titleOv">
            <div class="panel">
                <h1>오늘도 모이 난사 중</h1>
                <div class="btns"><button id="startBtn">시작</button><button id="shopBtn">상점</button><button
                        id="exitBtn">종료</button></div>
                <div id="titleResult" style="margin-top:10px;font-weight:700"></div>
            </div>
        </div>
        <div class="overlay" id="shopOv" hidden>
            <div class="panel">
                <h2 style="margin:0 0 6px">상점</h2>
                <div id="shopHeart" style="font-weight:800;margin-bottom:10px">보유 ❤️ 200</div>
                <div class="btns">
                    <button id="buySaltyBtn">🧂 짠맛 모이 (200❤️)</button>
                    <button id="buySweetBtn">🍬 단맛 모이 (200❤️)</button>
                    <button id="shopCloseBtn">닫기</button>
                </div>
            </div>
        </div>
        <div class="overlay" id="levelOv" hidden>
            <div class="panel">
                <h2 id="lvTitle" style="margin:0 0 8px">레벨 업!</h2>
                <p id="lvSub" style="margin:0 0 10px">카드 하나 선택</p>
                <div class="cards" id="lvCards"></div>
            </div>
        </div>
        <div class="overlay" id="evoOv" hidden>
            <div class="panel">
                <div id="evoMsg" style="font-size:28px;font-weight:800;color:#fde68a">무기 진화!</div>
            </div>
        </div>
        <div class="overlay" id="msgOv" hidden>
            <div class="msg" id="msgText"></div>
        </div>
        <div class="overlay" id="statsOv" hidden>
            <div class="panel">
                <h2 style="margin:0 0 8px">현재 스탯</h2>
                <div id="statsBody"></div><button id="statsCloseBtn">닫기 (C)</button>
            </div>
        </div>
        <div id="devPanel"><button data-stage="1">S1</button><button data-stage="2">S2</button><button
                data-stage="3">S3</button><button data-stage="4">S4</button><button data-stage="5">S5</button><button
                id="devBossBtn">보스전</button><button id="devMaxBtn">만렙(20)+카드</button></div>
    </div>
    <script>
        "use strict";
        const $ = id => document.getElementById(id), c = $("game"), x = c.getContext("2d");
        const hudHeart = $("hudHeart"), hudLevel = $("hudLevel"), hudCenter = $("hudCenter"), hudTimer = $("hudTimer"), xpText = $("xpText"), xpFill = $("xpFill");
        const bossHud = $("bossHud"), bossDirEl = $("bossDir"), bossFill = $("bossFill"), bossHpTxt = $("bossHpTxt"), bossTime = $("bossTime");
        const titleOv = $("titleOv"), levelOv = $("levelOv"), evoOv = $("evoOv"), msgOv = $("msgOv"), msgText = $("msgText"), statsOv = $("statsOv"), statsBody = $("statsBody"), statsCloseBtn = $("statsCloseBtn"), shopOv = $("shopOv");
        const titleResult = $("titleResult"), lvTitle = $("lvTitle"), lvSub = $("lvSub"), lvCards = $("lvCards"), evoMsg = $("evoMsg"), buffUi = $("buffUi"), devPanel = $("devPanel"), devBossBtn = $("devBossBtn"), devMaxBtn = $("devMaxBtn");
        const shopBtn = $("shopBtn"), shopHeart = $("shopHeart"), buySaltyBtn = $("buySaltyBtn"), buySweetBtn = $("buySweetBtn"), shopCloseBtn = $("shopCloseBtn");
        const sBtns = [$("s0"), $("s1")], sTimers = [$("st0"), $("st1")];
        const PLAYER_SPRITE_PATH = "player_sprite.png";
        const BOOM_IMAGE_PATH = "boom.webp";
        const BACKGROUND_IMAGE_PATH = "background.png";
        const BG_TILE_SCALE = .28;
        const PIGEON_SPRITE_BASE_PATH = "";
        const SPRITE_PATH_CANDIDATES = ["", "./", "sprites/", "assets/", "img/", "images/"];
        const VIEW_ZOOM = 1.6;
        const PIGEON_SPRITES = { dull: "pigeon_1001.png", adhd: "pigeon_1002.png", picky: "pigeon_1003.png", rude: "pigeon_1004.png", shy: "pigeon_1005.png", mom: "pigeon_1006.png", boss: "pigeon_1101.png" };
        const W = c.width, H = c.height, MW = W * 3, MH = H * 2;
        const LEVELS = (() => { const a = [10, 30, 60, 100, 150, 210, 280, 360, 450, 550]; while (a.length < 19) a.push(Math.round(a[a.length - 1] * 1.1)); return a; })(), AUTO_RANGE = 2, BASE_FIRE = .16, BASE_MS = 220;
        const ITEM_DROP = .15, ATOM_DROP = .05, ITEM_DUR = 5, FAT_ZONE = 1.5, FAT_MIN = 3, FAT_INC = 22, FAT_DEC = 18, BOSS_TIME = 90, BOSS_REDUCE = .5, BOSS_BASE_DMG = 60;
        const DIRS = [{ v: { x: 0, y: -1 }, a: "↑" }, { v: { x: 0, y: 1 }, a: "↓" }, { v: { x: -1, y: 0 }, a: "←" }, { v: { x: 1, y: 0 }, a: "→" }], DIR_DOT_REQ = .92;
        const STAGES = [{ id: "S1", t: 60, target: 180, drop: 1, sp: { dull: 200, adhd: 20 } }, { id: "S2", t: 60, target: 350, drop: 1, sp: { dull: 50, adhd: 150, picky: 50 } }, { id: "S3", t: 60, target: 560, drop: 1, sp: { dull: 50, adhd: 60, rude: 200 } }, { id: "S4 보너스", t: 30, target: 840, drop: 2, sp: { mom: 150 } }, { id: "S5", t: 90, target: 1300, drop: 1, sp: { dull: 60, picky: 60, shy: 200 } }];
        const game = { mode: "title", si: 0, se: 0, thumb: 0, hearts: 200, shop: { salty: false, sweet: false }, lv: 1, fat: 0, fireCd: 0, spawn: {}, msgAt: 0, msgCb: null, evoAt: 0, atomic: 0, boomT: 0, boss: null, shake: 0, debugPickLeft: 0 };
        const cam = { x: 0, y: 0 }, p = { x: MW / 2, y: MH / 2, r: 14, fx: 1, fy: 0, stun: 0 }, b = { w: null, fr: 1, dm: 1, sm: 1, ag: 1, mv: 1, fm: 1, hr: 1, evo: false };
        const SPR_W = 16, SPR_H = 16, SPR_COLS = 4, SPR_FRAME_SEC = .15, SPR_ROWS = { down: 0, up: 1, right: 2, left: 3, atk: 4, hit: 5, idle: 6 };
        const ps = { img: new Image(), ready: false, fail: false, frame: 0, t: 0, face: "down", state: "idle", lock: 0, row: SPR_ROWS.idle, flip: false };
        const boomImg = { img: new Image(), ready: false };
        const bgImg = { img: new Image(), ready: false };
        const BIRD_SPR_W = 16, BIRD_SPR_H = 16, BIRD_SPR_COLS = 4, BIRD_SPR_FRAME_SEC = .18, BIRD_SPR_ROWS = { move: 0, special: 1, sat: 2 };

            picky: { fw: 256, fh: 341, cols: 6, rows: 3, sec: .18, sw: 1, sh: 1, bottom: true },
            rude: { fw: 256, fh: 341, cols: 6, rows: 3, sec: .18, sw: 1, sh: 1, bottom: true },
            shy: { fw: 256, fh: 341, cols: 5, rows: 3, sec: .18, sw: 1, sh: 1, bottom: true },

        const keys = new Set(), foods = [], birds = [], fx = [], pickedCards = []; let last = 0;
        ps.img.src = PLAYER_SPRITE_PATH; ps.img.onload = () => ps.ready = true; ps.img.onerror = () => { ps.ready = false; ps.fail = true; };

        const pigeonImgs = {};

        function settleHearts() { const g = Math.floor(game.thumb * 0.01); game.hearts += g; return g; }

        function refreshShopUi() {

        function edgePos() { const pad = 18, s = Math.floor(R(0, 8)); if (s === 0) return { x: R(pad, MW - pad), y: pad }; if (s === 1) return { x: MW - pad, y: pad }; if (s === 2) return { x: MW - pad, y: R(pad, MH - pad) }; if (s === 3) return { x: MW - pad, y: MH - pad }; if (s === 4) return { x: R(pad, MW - pad), y: MH - pad }; if (s === 5) return { x: pad, y: MH - pad }; if (s === 6) return { x: pad, y: R(pad, MH - pad) }; return { x: pad, y: pad } }

        function adhdTurn(b0) {
